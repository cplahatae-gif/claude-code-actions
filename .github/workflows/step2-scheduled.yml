name: "Step 2 - Scheduled Automation"

# 매일 KST 07:00 (UTC 22:00) 자동 실행
# 주제 1: 중대재해처벌법 및 산업안전보건법
# 주제 2: AI/LLM 최신 기술 (Claude Code 등)

on:
  schedule:
    - cron: "0 22 * * *"  # UTC 22:00 = KST 07:00

  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions"

          prompt: |
            You are an automated daily digest generator. Today's date: $(date +%Y-%m-%d).
            Generate TWO separate markdown files as described below.

            ---

            ## File 1: 중대재해처벌법 & 산업안전보건법 동향
            Save to: output/daily-safety-law-$(date +%Y-%m-%d).md

            Use WebSearch to find the latest news and updates (within 7 days) on:
            - 중대재해처벌법 (Serious Accidents Punishment Act)
            - 산업안전보건법 (Occupational Safety and Health Act)
            - 관련 판례, 처벌 사례, 법령 개정 동향
            - 기업 대응 사례 및 안전보건 트렌드

            Write in Korean. Structure:
            # 📋 중대재해처벌법 & 산업안전보건법 동향 - {날짜}

            ## 핵심 요약 (3-5줄)
            ## 주요 뉴스 & 판례
            ## 법령 개정 동향
            ## 기업 대응 사례
            ## 출처

            ---

            ## File 2: AI/LLM 최신 기술 동향
            Save to: output/daily-ai-llm-$(date +%Y-%m-%d).md

            Use WebSearch to find the latest news and updates (within 7 days) on:
            - Claude Code, Anthropic 최신 업데이트
            - LLM 모델 최신 릴리즈 및 기능
            - AI 에이전트, 코딩 AI 트렌드
            - 국내외 AI 활용 사례

            Write in Korean. Structure:
            # 🤖 AI/LLM 최신 기술 동향 - {날짜}

            ## 핵심 요약 (3-5줄)
            ## 주요 모델 & 기술 업데이트
            ## Claude Code & Anthropic 소식
            ## AI 활용 사례
            ## 출처

            ---

            ## After creating both files, run:
            ```
            git config user.name "Claude Code Bot"
            git config user.email "claude-bot@github-actions"
            git add output/
            git commit -m "daily digest: $(date +%Y-%m-%d)"
            git push origin main
            ```
